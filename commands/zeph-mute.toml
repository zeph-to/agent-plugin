description = "Mute Zeph notifications for this session"
prompt = """
Mute Zeph notifications.

Run this bash command:
```bash
HASH=$(echo -n "$CLAUDE_PROJECT_DIR" | cksum | cut -d' ' -f1)
if [ -f "/tmp/zeph-muted-$HASH" ]; then echo "ALREADY_MUTED"; else touch "/tmp/zeph-muted-$HASH" && echo "MUTED"; fi
```

If output is ALREADY_MUTED: respond "이미 비활성화 상태. /zeph-unmute로 활성화 가능."
If output is MUTED: respond "Zeph 알림 비활성화됨. /zeph-unmute로 다시 활성화."
"""
