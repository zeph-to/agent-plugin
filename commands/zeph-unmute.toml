description = "Unmute Zeph notifications for this session"
prompt = """
Unmute Zeph notifications.

Run this bash command:
```bash
HASH=$(echo -n "$CLAUDE_PROJECT_DIR" | cksum | cut -d' ' -f1)
if [ -f "/tmp/zeph-muted-$HASH" ]; then rm -f "/tmp/zeph-muted-$HASH" && echo "UNMUTED"; else echo "NOT_MUTED"; fi
```

If output is NOT_MUTED: respond "이미 활성화 상태."
If output is UNMUTED: respond "Zeph 알림 다시 활성화됨."
"""
